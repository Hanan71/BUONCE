<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بونس - تسجيل الدخول</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="mobile-frame">
        <div class="auth-page" style="padding: 40px 25px; height: 100%; display: flex; flex-direction: column; background: white;">
            
            <div style="text-align: center; margin-bottom: 30px; margin-top: 40px;">
                <img src="/BUONCE/images/logo.png" alt="Logo" style="width: 90px; height: 90px; border-radius: 50%;">
                <h2 style="color: var(--pnu-dark); margin-top: 20px; font-size: 24px;">مرحباً بكِ مجدداً</h2>
                <p style="color: #888; font-size: 14px;">سجلي دخولك للمتابعة في بونس</p>
            </div>

            <p style="font-size: 12px; color: #bbb; text-align: center; margin-bottom: 10px;">ادخلي كـ :</p>
            <div style="display: flex; gap: 10px; margin-bottom: 30px;">
                <a href="customer_home.html" style="flex: 1; text-decoration: none; text-align: center; padding: 10px; border: 1px solid #efefef; border-radius: 12px; background: #fdfdfd; color: var(--pnu-dark); font-size: 12px;">
                    <i class="fas fa-user-circle" style="display: block; margin-bottom: 5px; color: var(--pnu-teal);"></i> عميلة
                </a>
                <a href="pnu_driver_explore.html" style="flex: 1; text-decoration: none; text-align: center; padding: 10px; border: 1px solid #efefef; border-radius: 12px; background: #fdfdfd; color: var(--pnu-dark); font-size: 12px;">
                    <i class="fas fa-id-badge" style="display: block; margin-bottom: 5px; color: var(--pnu-teal);"></i> مندوبة PNU
                </a>
                <a href="external_driver_map.html" style="flex: 1; text-decoration: none; text-align: center; padding: 10px; border: 1px solid #efefef; border-radius: 12px; background: #fdfdfd; color: var(--pnu-dark); font-size: 12px;">
                    <i class="fas fa-truck" style="display: block; margin-bottom: 5px; color: var(--pnu-teal);"></i> خارجي
                </a>
            </div>

            <div class="auth-form" style="display: flex; flex-direction: column; gap: 18px;">
                <div class="input-group" style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #ccc;"></i>
                    <input type="email" placeholder="البريد الإلكتروني" style="width: 100%; padding: 14px 45px 14px 15px; border-radius: 12px; border: 1px solid #efefef; background: #fdfdfd; outline: none; font-family: inherit; box-sizing: border-box;">
                </div>
                
                <div class="input-group" style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #ccc;"></i>
                    <input type="password" placeholder="كلمة المرور" style="width: 100%; padding: 14px 45px 14px 15px; border-radius: 12px; border: 1px solid #efefef; background: #fdfdfd; outline: none; font-family: inherit; box-sizing: border-box;">
                </div>

                <div style="text-align: left;">
                    <a href="#" style="color: var(--pnu-teal); font-size: 12px; text-decoration: none;">نسيتِ كلمة المرور؟</a>
                </div>
            </div>

            <button class="new-order-btn" style="margin-top: 35px; width: 100%; border: none; font-family: inherit; cursor: pointer; height: 50px; font-size: 16px;">
                تسجيل الدخول
            </button>

            <div style="margin-top: 30px; text-align: center;">
                <p style="color: #bbb; font-size: 12px; position: relative; display: inline-block; width: 100%;">
                    <span style="background: white; padding: 0 10px; position: relative; z-index: 1;">أو سجل عبر</span>
                    <span style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: #eee; z-index: 0;"></span>
                </p>
                <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
                    <i class="fab fa-apple" style="font-size: 24px; color: #333; cursor: pointer;"></i>
                    <i class="fab fa-google" style="font-size: 22px; color: #DB4437; cursor: pointer;"></i>
                </div>
            </div>

            <p style="text-align: center; margin-top: auto; font-size: 14px; color: #666; padding-bottom: 20px;">
                ليس لديكِ حساب؟ <a href="signup.html" style="color: var(--pnu-teal); font-weight: bold; text-decoration: none;">إنشاء حساب جديد</a>
            </p>

        </div>
    </div>
</body>
</html>
