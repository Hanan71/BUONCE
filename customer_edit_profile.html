<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - تعديل الملف</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bottom-nav {
            background: white; border-top: 1px solid #eee; display: flex;
            justify-content: space-around; padding: 12px 0; position: absolute;
            bottom: 0; width: 100%; z-index: 100;
        }
        .nav-item {
            text-align: center; text-decoration: none; color: #bbb;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; }
        .nav-item.active { color: #2c8fac; }

        /* ستايل المدخلات */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
            padding-right: 5px;
        }
        .form-control {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #eee;
            background: #f9f9f9;
            font-family: inherit;
            font-size: 14px;
            color: #134454;
            outline: none;
            box-sizing: border-box;
        }
        .form-control:focus {
            border-color: #2c8fac;
            background: white;
        }

        .save-btn {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            background: #134454;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 16px;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(19,68,84,0.2);
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="edit-profile-page" style="height: 100%; display: flex; flex-direction: column; background: #fff; position: relative;">
            
            <header style="padding: 20px; display: flex; align-items: center; justify-content: space-between;">
                <a href="customer_profile.html" style="color: #333; font-size: 20px;"><i class="fas fa-arrow-right"></i></a>
                <h3 style="font-size: 18px; margin: 0; color: #134454; font-weight: bold;">تعديل الملف الشخصي</h3>
                <div style="width: 20px;"></div>
            </header>

            <main style="flex: 1; padding: 10px 20px; overflow-y: auto; padding-bottom: 100px;">
                
                <div style="text-align: center; margin-bottom: 30px;">
                    <div style="position: relative; width: 90px; height: 90px; margin: 0 auto;">
                        <div style="width: 100%; height: 100%; background: #f0f4f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #2c8fac; overflow: hidden;">
                            <i class="fas fa-user-graduate" style="font-size: 45px; color: #134454;"></i>
                        </div>
                        <div style="position: absolute; bottom: 0; left: 0; background: #2c8fac; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 2px solid white; cursor: pointer;">
                            <i class="fas fa-camera" style="font-size: 12px;"></i>
                        </div>
                    </div>
                    <p style="font-size: 12px; color: #2c8fac; margin-top: 10px; font-weight: 500;">تغيير الصورة الشخصية</p>
                </div>

                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" class="form-control" value="شمس محمد">
                </div>

                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" class="form-control" value="shams@pnu.edu.sa">
                </div>

                <div class="form-group">
                    <label>رقم الجوال</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" class="form-control" style="flex: 1;" value="05XXXXXXXX">
                        <span style="background: #eee; padding: 15px; border-radius: 15px; font-size: 14px; color: #666;">966+</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>الكلية / التخصص</label>
                    <input type="text" class="form-control" value="كلية الحاسب والمعلومات">
                </div>

                <button class="save-btn">حفظ التغييرات</button>

            </main>

            <nav class="bottom-nav">
                <a href="customer_home.html" class="nav-item active"><i class="fas fa-map"></i><span>خريطة</span></a>
                <a href="customer_order.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>طلبات</span></a>
                <a href="customer_rewards.html" class="nav-item"><i class="fas fa-gift"></i><span>مكافات</span></a>
                <a href="customer_profile.html" class="nav-item"><i class="fas fa-user"></i><span>الحساب</span></a>
            </nav>

        </div>
    </div>
</body>
</html>
