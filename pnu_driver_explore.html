<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - استكشاف الطلبات</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .mobile-frame { 
            width: 100%; max-width: 400px; height: 800px; 
            background: white; position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            border-radius: 40px; border: 12px solid #333; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        .bottom-nav {
            background: white; border-top: 1px solid #eee; display: flex;
            justify-content: space-around; padding: 12px 0; position: absolute;
            bottom: 0; width: 100%; z-index: 100;
        }
        .nav-item {
            text-align: center; text-decoration: none; color: #bbb;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; font-weight: 500; }
        .nav-item.active { color: #134454; }

        .search-container { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 10; }
        .driver-status-bar {
            background: #134454; padding: 12px 15px; border-radius: 15px;
            display: flex; align-items: center; justify-content: space-between;
            color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* أنيميشن الإشعار المتحرك */
        @keyframes float {
            0% { transform: translateY(0px) translateX(-50%); }
            50% { transform: translateY(-10px) translateX(-50%); }
            100% { transform: translateY(0px) translateX(-50%); }
        }

        .floating-alert {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            background: #e4b33e; color: white; padding: 10px 20px;
            border-radius: 25px; font-size: 13px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(228,179,62,0.4);
            z-index: 20; display: flex; align-items: center; gap: 10px;
            white-space: nowrap; animation: float 2s ease-in-out infinite;
            cursor: pointer; text-decoration: none;
        }

        .category-chip {
            background: white; padding: 10px 15px; border-radius: 20px;
            font-size: 12px; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0; display: flex; align-items: center; gap: 8px;
            color: #555;
        }
        
        .map-marker {
            position: absolute; pointer-events: auto; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="main-app" style="height: 100%; position: relative; background: #eee; overflow: hidden;">
            
            <div class="search-container">
                <div class="driver-status-bar">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-circle" style="color: #86c2a4; font-size: 10px;"></i>
                        <span style="font-size: 14px; font-weight: bold;">أنتِ متصلة الآن</span>
                    </div>
                    <div style="font-size: 12px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 8px;">
                        رصيد: 1450 نقطة
                    </div>
                </div>
                
                <div style="display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px;">
                    <span class="category-chip" style="border-color: #134454; color: #134454; font-weight: bold;">
                        <i class="fas fa-list-ul"></i> الكل
                    </span>
                    <span class="category-chip"><i class="fas fa-coffee"></i> كافيه</span>
                    <span class="category-chip"><i class="fas fa-box"></i> لوكر</span>
                    <span class="category-chip"><i class="fas fa-file-alt"></i> أوراق</span>
                </div>
            </div>

            <a href="pnu_driver_tasks_list.html" class="floating-alert">
                <i class="fas fa-bell"></i> طلب جديد قريب منكِ! (م3)
            </a>

            <div style="height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1;">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14488.944203774614!2d46.723!3d24.814!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sar!2ssa!4v1712160000000!5m2!1sar!2ssa" 
                        width="100%" height="100%" style="border:0; filter: grayscale(0.2);" allowfullscreen="" loading="lazy"></iframe>
                
<a href="pnu_driver_tasks_list.html" class="map-marker" style="top: 40%; left: 30%; text-decoration: none; position: absolute; z-index: 5;">
    <i class="fas fa-shopping-cart" style="color: #e74c3c; font-size: 20px; background: white; padding: 10px; border-radius: 50%; box-shadow: 0 4px 12px rgba(231,76,60,0.3); border: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center;"></i>
</a>

<a href="pnu_driver_tasks_list.html" class="map-marker" style="top: 60%; left: 70%; text-decoration: none; position: absolute; z-index: 5;">
    <i class="fas fa-box" style="color: #e74c3c; font-size: 20px; background: white; padding: 10px; border-radius: 50%; box-shadow: 0 4px 12px rgba(231,76,60,0.3); border: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center;"></i>
</a>
                
                <div style="position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;">
                    <div style="width: 20px; height: 20px; background: #2c8fac; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px rgba(44,143,172,0.5);"></div>
                </div>
            </div>

            <a href="pnu_driver_tasks_list.html" style="text-decoration: none; position: absolute; bottom: 100px; left: 20px; right: 20px; z-index: 10;">
                <button style="width: 100%; padding: 16px; background: #134454; color: white; border: none; border-radius: 15px; font-family: inherit; font-size: 15px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <i class="fas fa-clipboard-list"></i> عرض الطلبات المتاحة
                </button>
            </a>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-map"></i><span>خريطة</span></a>
            <a href="orders.html" class="nav-item active"><i class="fas fa-clipboard-list"></i><span>طلبات</span></a>
            <a href="rewards.html" class="nav-item"><i class="fas fa-gift"></i><span>مكافئات</span></a>
            <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>الحساب</span></a>
        </nav>

        </div>
    </div>
</body>
</html>
