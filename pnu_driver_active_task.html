<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بونس - المهمة الحالية</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* التنسيق الموحد للفريم والخلفية */
        body { 
            margin: 0; background: #134454; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .mobile-frame { 
            width: 100%; max-width: 400px; height: 800px; background: white; 
            position: relative; border-radius: 40px; border: 12px solid #333; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* الجزء العلوي (الخريطة الحية) */
        .live-map { height: 45%; position: relative; background: #eee; }
        
        .driver-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; background: #2c8fac; border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 20px rgba(44,143,172,0.6);
            z-index: 5;
        }

        /* كرت تفاصيل المهمة (الجزء السفلي) */
        .task-details {
            flex: 1; background: white; border-radius: 30px 30px 0 0;
            margin-top: -30px; position: relative; z-index: 10;
            padding: 25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }

        .instruction-card {
            background: #f0f7f9; border: 1px solid #e1eef2;
            padding: 15px; border-radius: 15px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 15px;
        }

        /* الخط الزمني المصغر داخل الصفحة */
        .mini-stepper {
            display: flex; align-items: center; gap: 10px; margin-bottom: 25px;
        }
        .step { width: 10px; height: 10px; border-radius: 50%; background: #ddd; }
        .step.active { background: #86c2a4; box-shadow: 0 0 8px #86c2a4; }
        .step-line { flex: 1; height: 2px; background: #eee; }

        /* الأزرار التفاعلية */
        .main-action-btn {
            background: #134454; color: white; border: none; padding: 18px;
            border-radius: 15px; width: 100%; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: auto; margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(19,68,84,0.3);
        }
        .contact-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .contact-btn {
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #efefef;
            background: #fdfdfd; color: #134454; text-align: center;
            text-decoration: none; font-size: 13px; font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        
        <div class="live-map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14491.5645731995!2d46.7237!3d24.8471!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2ssa!4v1712170000000!5m2!1sen!2ssa" 
                    width="100%" height="100%" style="border:0; filter: grayscale(0.2);" allowfullscreen="" loading="lazy"></iframe>
            <div class="driver-indicator"></div>
        </div>

        <div class="task-details">
            
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="width: 40px; height: 4px; background: #eee; border-radius: 10px; margin: 0 auto 15px;"></div>
                <h3 style="margin: 0; color: #134454;">جاري تنفيذ المهمة 🚀</h3>
            </div>

            <div class="mini-stepper">
                <div class="step active"></div>
                <div class="step-line"></div>
                <div class="step"></div>
                <div class="step-line"></div>
                <div class="step"></div>
            </div>

            <div class="instruction-card">
                <div style="background: #134454; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white;">
                    <i class="fas fa-coffee"></i>
                </div>
                <div>
                    <span style="font-size: 11px; color: #888;">الموقع الحالي:</span>
                    <h4 style="margin: 0; font-size: 14px; color: #134454;">كافيه بارن (محطة A4)</h4>
                </div>
            </div>

            <div class="contact-row">
                <a href="tel:05XXXXXXX" class="contact-btn">
                    <i class="fas fa-phone-alt"></i> اتصلي بالعميلة
                </a>
                <a href="#" class="contact-btn">
                    <i class="fas fa-comment-dots"></i> دردشة
                </a>
            </div>

            <div style="padding: 10px 5px;">
                <p style="font-size: 13px; color: #555; margin: 5px 0;">
                    <i class="fas fa-user-circle" style="color: #ccc; margin-left: 5px;"></i> 
                    العميلة: <strong>سارة الأحمد</strong>
                </p>
                <p style="font-size: 13px; color: #555; margin: 5px 0;">
                    <i class="fas fa-map-pin" style="color: #ccc; margin-left: 5px;"></i> 
                    الوجهة: <strong>كلية اللغات - الدور الثاني</strong>
                </p>
            </div>

            <button class="main-action-btn" id="taskAction" onclick="updateStatus()">
                تم استلام الطلب من المحل
            </button>
            <p style="text-align: center; font-size: 10px; color: #bbb; margin-top: 5px;">
                اضغطي الزر عند الانتهاء من كل خطوة
            </p>

        </div>
    </div>

    <script>
        let status = 0;
        function updateStatus() {
            const btn = document.getElementById('taskAction');
            const steps = document.querySelectorAll('.step');
            
            if(status === 0) {
                btn.innerText = "جاري التوصيل.. اضغطي عند التسليم";
                btn.style.background = "#2c8fac";
                steps[2].classList.add('active');
                status = 1;
            } else if(status === 1) {
                btn.innerText = "تم تسليم الطلب بنجاح ✅";
                btn.style.background = "#86c2a4";
                steps[4].classList.add('active');
                setTimeout(() => {
                    alert('كفو يا حنو! تم إضافة 15 ريال لمحفظتك 💰');
                    window.location.href = 'pnu_driver_explore.html';
                }, 1000);
            }
        }
    </script>
</body>
</html>
