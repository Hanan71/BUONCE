<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بونس - تفاصيل الإيداع في اللوكر</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* الاستايل الموحد للجوال والخلفية */
        body { 
            margin: 0; background: #134454; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; 
            font-family: 'Segoe UI', sans-serif;
        }
        .mobile-frame { 
            width: 100%; max-width: 400px; height: 800px; background: #f9f9f9; 
            position: relative; border-radius: 40px; border: 12px solid #333; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* الهيدر البترولي */
        .header {
            background: #134454; color: white; padding: 45px 20px 25px;
            text-align: center; border-radius: 0 0 25px 25px;
        }
        .back-link { position: absolute; top: 45px; right: 20px; color: white; text-decoration: none; }

        /* كرت المهمة الرئيسي */
        .locker-card {
            margin: -20px 20px 20px; background: white; border-radius: 20px;
            padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #efefef; text-align: center;
        }

        .barcode-section {
            background: #fdfdfd; border: 2px dashed #eee; padding: 20px;
            border-radius: 15px; margin: 20px 0;
        }
        .barcode-placeholder {
            width: 100%; height: 80px; background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/UPC-A-barcode.svg/1200px-UPC-A-barcode.svg.png');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            opacity: 0.8;
        }

        .locker-info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            margin-top: 20px; text-align: right;
        }
        .info-box {
            background: #f8fafb; padding: 12px; border-radius: 12px;
            border: 1px solid #f0f4f5;
        }
        .info-box label { font-size: 10px; color: #888; display: block; margin-bottom: 4px; }
        .info-box span { font-size: 13px; color: #134454; font-weight: bold; }

        .btn-deposit {
            background: #134454; color: white; border: none; padding: 18px;
            border-radius: 15px; width: 100%; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: auto; margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(19,68,84,0.2);
        }

        .location-link {
            color: #2c8fac; text-decoration: none; font-size: 12px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            margin-top: 10px; font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <a href="external_driver_map.html" class="back-link"><i class="fas fa-chevron-right"></i></a>
        
        <div class="header">
            <h3 style="margin: 0;">إيداع شحنة </h3><i class="fas fa-box-open"></i>
            <p style="font-size: 12px; opacity: 0.8; margin-top: 5px;">رقم التتبع: #BNC-77210</p>
        </div>

        <div style="padding: 0 20px; flex: 1; display: flex; flex-direction: column;">
            <div class="locker-card">
                <span style="font-size: 12px; color: #888;">امسح الكود عند جهاز اللوكر لفتح الخزانة</span>
                
                <div class="barcode-section">
                    <div class="barcode-placeholder"></div>
                    <span style="font-size: 14px; font-weight: bold; color: #333; letter-spacing: 2px;">992 001 773</span>
                </div>

                <div class="locker-info-grid">
                    <div class="info-box">
                        <label>موقع اللوكر</label>
                        <span>بوابة 1 - محطة A4</span>
                    </div>
                    <div class="info-box">
                        <label>رقم الخزانة</label>
                        <span>L-14 (حجم M)</span>
                    </div>
                </div>

                <a href="#" class="location-link">
                    <i class="fas fa-directions"></i> فتح الموقع في خرائط جوجل
                </a>
            </div>

            <div style="padding: 10px 5px;">
                <h4 style="font-size: 14px; color: #134454; margin-bottom: 10px;">تفاصيل الشحنة:</h4>
                <div style="display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 8px;">
                    <span>المرسل:</span>
                    <span style="color: #333; font-weight: 500;">متجر نمشي (Namshi)</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 8px;">
                    <span>المستلم (طالبة):</span>
                    <span style="color: #333; font-weight: 500;">نورة م.</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 13px; color: #666;">
                    <span>النقاط المكتسبه:</span>
                    <span style="color: #86c2a4; font-weight: bold;">12 نقطة⭐</span>
                </div>
            </div>

            <button class="btn-deposit" onclick="alert('تم فتح الخزانة L-14 بنجاح! يرجى وضع الشحنة وإغلاق الباب.')">
                فتح الخزانة الآن
            </button>
            <p style="text-align: center; font-size: 11px; color: #bbb; margin-bottom: 25px;">
                <i class="fas fa-shield-alt"></i> تأكد من إغلاق باب الخزانة جيداً بعد الإيداع.
            </p>
        </div>
    </div>
</body>
</html>
