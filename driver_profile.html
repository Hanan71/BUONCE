<!DOCTYPE html>

<body>
    <div class="mobile-frame">

                        <p style="font-size: 14px; color: var(--pnu-dark); margin: 2px 0 0; font-weight: bold;">050XXXXXXX</p>

                </div>

                                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding: 12px; background: #f9f9f9; border-radius: 15px;">
