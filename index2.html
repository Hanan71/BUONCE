<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - واجهة المندوبة</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ستايل الناف بار اللي تحبينه */
        .bottom-nav {
            background: white; border-top: 1px solid #eee; display: flex;
            justify-content: space-around; padding: 12px 0; position: absolute;
            bottom: 0; width: 100%; z-index: 100;
        }
        .nav-item {
            text-align: center; text-decoration: none; color: #bbb;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; }
        .nav-item.active { color: var(--pnu-teal); }

        /* ستايل الكروت الملونة مثل صورتك */
        .stat-card {
            padding: 15px; border-radius: 15px; color: white;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="main-app" style="height: 100%; display: flex; flex-direction: column; background: #fff; position: relative;">
            

            <header style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <i class="fas fa-bell" style="color: #333;"></i>
                    <div style="width: 35px; height: 35px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-user-tie" style="color: #ccc;"></i>
                    </div>
                </div>
                <img src="images/Logo.png" alt="Logo" style="width: 30px;">
            </header>

           
            <main style="padding: 15px; flex: 1; overflow-y: auto; padding-bottom: 80px;">
                
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
                        <div class="stat-card" style="background: #81c784;"><i class="fas fa-bolt" style="color: white;"></i>
                            <span style="font-size: 13px;">توصيل<br><small>توصيل سريع</small></span>
                        </div>
                        <div class="stat-card" style="background: #4db6ac;"><i class="fas fa-star" style="color: white;"></i>
                            <span style="font-size: 13px;">طلبات<br><small>خاصة</small></span>
                        </div>
                        <div class="stat-card" style="background: #fdfdfd; color: #333; border: 1px solid #eee;"><i class="fas fa-utensils" style="color: #4db6ac;"></i>
                            <span style="font-size: 13px;">طعام<br><small>مطاعم</small></span>
                        </div>
                        <div class="stat-card" style="background: #263238;"><i class="fas fa-box" style="color: #81c784;"></i>
                            <span style="font-size: 13px;">لوكر<br><small>تسليم</small></span>
                        </div>
                    </div>



                    <div style="flex: 1.2; border-radius: 20px; overflow: hidden; border: 1px solid #eee; position: relative;">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3620.916124403164!2d46.72147321500213!3d24.843657884061545!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3e2eff3933da3345%3A0x6a053f317669d0d!2sPrincess%20Nourah%20bint%20Abdulrahman%20University!5e0!3m2!1sen!2ssa!4v1712151000000!5m2!1sen!2ssa" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                        <div style="position: absolute; top: 10px; left: 10px; background: white; padding: 5px 10px; border-radius: 10px; font-size: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                            Maps <i class="fas fa-external-link-alt"></i>
                        </div>
                    </div>
                </div>

<a href="pnu_driver_explore.html" style="text-decoration: none; display: block;">
    <button style="width: 100%; background: #a5d6a7; color: white; border: none; padding: 12px; border-radius: 12px; font-family: inherit; margin-bottom: 25px; cursor: pointer; font-weight: bold;">
        بدء استقبال الطلبات / Start Delivery
    </button>
</a>

<div style="background: white; border: 1px solid #f0f0f0; border-radius: 20px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); margin-top: 15px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">

        <span style="background: #e0f2f1; color: #134454; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: bold;">رقم الطلب: #BD-224</span>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: flex-start; text-align: center; position: relative; padding: 0 10px;">
        
        <div style="position: absolute; top: 25px; left: 15%; right: 15%; height: 2px; background: #eee; z-index: 1;"></div>
        
        <div style="z-index: 2; background: white; width: 80px;">
            <div style="width: 50px; height: 50px; background: #f5f5f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px;">
                <i class="fas fa-map-marker-alt" style="color: #ccc; font-size: 18px;"></i>
            </div>
            <p style="font-size: 9px; color: #888; margin: 0;">نقطة الاستلام</p>
        </div>

        <div style="z-index: 2; background: white; width: 80px; margin-top: -5px;">
            <div class="active-glow" style="width: 55px; height: 55px; background: #f0f7f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; border: 2px solid #86c2a4; position: relative;">
                <i class="fas fa-walking" style="color: #134454; font-size: 24px;"></i>
            </div>
            <p style="font-size: 10px; color: #134454; font-weight: bold; margin: 0;">في الطريق</p>
        </div>

        <div style="z-index: 2; background: white; width: 80px;">
            <div style="width: 50px; height: 50px; background: #f5f5f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px;">
                <i class="fas fa-box-open" style="color: #ccc; font-size: 18px;"></i>
            </div>
            <p style="font-size: 9px; color: #888; margin: 0;">تم التسليم</p>
        </div>
    </div>

    <div style="margin-top: 25px; border-radius: 15px; overflow: hidden; height: 110px; border: 1px solid #eee;">
        <img src="images/PNU.JPG" alt="PNU Building" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.9;">
    </div>

            </main>

        <nav class="bottom-nav">
            <a href="index2.html" class="nav-item"><i class="fas fa-map"></i><span>خريطة</span></a>
            <a href="orders.html" class="nav-item active"><i class="fas fa-clipboard-list"></i><span>طلبات</span></a>
            <a href="rewards.html" class="nav-item"><i class="fas fa-gift"></i><span>مكافئات</span></a>
            <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>الحساب</span></a>
        </nav>

        </div>
    </div>

</html>
