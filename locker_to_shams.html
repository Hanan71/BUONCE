<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - توصيل إليكِ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .mobile-frame { width: 100%; max-width: 400px; height: 800px; background: white; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); border-radius: 40px; border: 12px solid #333; overflow: hidden; display: flex; flex-direction: column; }
        header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; }
        .address-box { border: 2px dashed #2c8fac; border-radius: 15px; padding: 15px; margin: 20px; background: #f0f7f9; }
        .btn-confirm { background: #2c8fac; color: white; border: none; padding: 18px; border-radius: 15px; margin: auto 20px 30px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; }
    </style>
    

</head>
<body>
    <div class="mobile-frame">
            <header style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; gap: 10px; align-items: center;"></div>
            <a href="customer_driver.html" style="color: #333;"><i class="fas fa-arrow-right"></i></a>
            <h3 style="margin: 0; font-size: 17px; color: #134454; display: flex; align-items: center; gap: 8px;">
                توصيل لموقعكِ <i class="fas fa-location-dot" style="font-size: 16px;"></i>
            </h3>
            <div style="width: 20px;"></div>
        </header>
        <main style="padding: 10px;">
            <div style="text-align: center; padding: 20px;">
                <i class="fas fa-hand-holding-heart" style="font-size: 45px; color: #2c8fac;"></i>
                <h4 style="color: #134454;">خدمة التوصيل الشخصي</h4>
                <p style="font-size: 12px; color: #888;">ستقوم حياة باستلام شحنتكِ من اللوكر وإحضارها لكِ</p>
            </div>

            <div class="address-box">
                <p style="margin: 0 0 10px; font-size: 13px; font-weight: bold; color: #134454;">أين أنتِ الآن يا شمس؟</p>
                <div style="display: flex; align-items: center; gap: 10px; background: white; padding: 10px; border-radius: 10px;">
                    <i class="fas fa-location-arrow" style="color: #2c8fac;"></i>
                    <span style="font-size: 12px;">مكتبة كلية اللغات - الدور الثاني</span>
                </div>
            </div>

            <div style="padding: 0 20px;">
                <p style="font-size: 12px; color: #b78d21; background: #fff9eb; padding: 10px; border-radius: 10px;">
                    <i class="fas fa-clock"></i> الوقت المتوقع للوصول: 15-20 دقيقة
                </p>
            </div>
        </main>
        <a href="shams_success.html" class="btn-confirm">اطلبي الآن</a>
    </div>
</body>
</html>
