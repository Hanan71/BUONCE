<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - عناويني</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bottom-nav {
            background: white; border-top: 1px solid #eee; display: flex;
            justify-content: space-around; padding: 12px 0; position: absolute;
            bottom: 0; width: 100%; z-index: 100;
        }
        .nav-item {
            text-align: center; text-decoration: none; color: #bbb;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; }
        .nav-item.active { color: #2c8fac; }

        /* ستايل بطاقة العنوان */
        .address-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px; background: white; border-radius: 15px;
            margin-bottom: 15px; border: 1px solid #f0f0f0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            cursor: pointer; transition: 0.3s;
        }
        .address-card:active { transform: scale(0.98); background: #f9f9f9; }
        
        .address-icon {
            width: 45px; height: 45px; background: #f0f4f8;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; color: #134454; font-size: 20px;
            margin-left: 15px;
        }
        
        .add-address-btn {
            width: 100%; padding: 16px; border-radius: 15px;
            background: #134454; color: white; border: none;
            font-weight: bold; font-size: 15px; margin-top: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 8px 15px rgba(19,68,84,0.2);
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="address-page" style="height: 100%; display: flex; flex-direction: column; background: #fff; position: relative;">
            
            <header style="padding: 20px; display: flex; align-items: center; justify-content: space-between;">
                <a href="customer_profile.html" style="color: #333; font-size: 20px;"><i class="fas fa-arrow-right"></i></a>
                <h3 style="font-size: 18px; margin: 0; color: #134454; font-weight: bold;">عناويني المحفوظة</h3>
                <div style="width: 20px;"></div>
            </header>

<main style="flex: 1; padding: 10px 20px; overflow-y: auto; padding-bottom: 100px;">
                
    <div class="address-card">
        <div style="display: flex; align-items: center;">
            <div class="address-icon">
                <i class="fas fa-university"></i>
            </div>
            <div>
                <h4 style="margin: 0; font-size: 15px; color: #134454;">كلية الحاسب</h4>
                <p style="margin: 3px 0 0; font-size: 12px; color: #888;">محطة A4 - مبنى 0.400</p>
            </div>
        </div>
        <i class="fas fa-ellipsis-v" style="color: #ccc; font-size: 14px;"></i>
    </div>

    <div class="address-card">
        <div style="display: flex; align-items: center;">
            <div class="address-icon">
                <i class="fas fa-book"></i>
            </div>
            <div>
                <h4 style="margin: 0; font-size: 15px; color: #134454;">المكتبة المركزية</h4>
                <p style="margin: 3px 0 0; font-size: 12px; color: #888;">منطقة الخدمات المركزية - الدور الأول</p>
            </div>
        </div>
        <i class="fas fa-ellipsis-v" style="color: #ccc; font-size: 14px;"></i>
    </div>

    <div class="address-card">
        <div style="display: flex; align-items: center;">
            <div class="address-icon">
                <i class="fas fa-bed"></i>
            </div>
            <div>
                <h4 style="margin: 0; font-size: 15px; color: #134454;">السكن الجامعي</h4>
                <p style="margin: 3px 0 0; font-size: 12px; color: #888;">مبنى 12 - جناح 3 - غرفة 102</p>
            </div>
        </div>
        <i class="fas fa-ellipsis-v" style="color: #ccc; font-size: 14px;"></i>
    </div>

    <div class="address-card">
        <div style="display: flex; align-items: center;">
            <div class="address-icon">
                <i class="fas fa-dumbbell"></i>
            </div>
            <div>
                <h4 style="margin: 0; font-size: 15px; color: #134454;">النادي الرياضي</h4>
                <p style="margin: 3px 0 0; font-size: 12px; color: #888;">منطقة الأنشطة الطلابية - الصالة الرئيسية</p>
            </div>
        </div>
        <i class="fas fa-ellipsis-v" style="color: #ccc; font-size: 14px;"></i>
    </div>

    <button class="add-address-btn">
        <i class="fas fa-plus-circle"></i> إضافة موقع جديد في الجامعة
    </button>

</main>

            <nav class="bottom-nav">
                <a href="customer_home.html" class="nav-item active"><i class="fas fa-map"></i><span>خريطة</span></a>
                <a href="customer_order.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>طلبات</span></a>
                <a href="customer_rewards.html" class="nav-item"><i class="fas fa-gift"></i><span>مكافات</span></a>
                <a href="customer_profile.html" class="nav-item"><i class="fas fa-user"></i><span>الحساب</span></a>
            </nav>

        </div>
    </div>
</body>
    <script src="js/script.js"></script>
</html>
