<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - استلام ناجح</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; background: #f0f2f5; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .mobile-frame { 
            width: 100%; max-width: 400px; height: 800px; 
            background: white; position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            border-radius: 40px; border: 12px solid #333; 
            overflow: hidden; display: flex; flex-direction: column; text-align: center;
        }

        /* أنيميشن بسيط لأيقونة الصندوق */
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-box-icon {
            width: 120px; height: 120px;
            background: #f0f7f9; color: #2c8fac;
            border-radius: 25px; display: flex;
            align-items: center; justify-content: center;
            font-size: 55px; margin: 80px auto 30px;
            animation: bounceIn 0.8s ease;
            border: 2px solid #e0f2f1;
        }

        .rating-section {
            margin: 30px 20px; padding: 20px;
            border-radius: 20px; background: #f9f9f9;
        }

        .stars { color: #ddd; font-size: 24px; margin-top: 10px; cursor: pointer; }
        .stars i:hover, .stars i.active { color: #f1c40f; }

        .done-btn {
            background: #134454; color: white; border: none;
            padding: 18px; border-radius: 15px;
            margin: auto 25px 40px; font-size: 16px;
            font-weight: bold; cursor: pointer; text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="mobile-frame">
        <div class="success-box-icon">
            <i class="fas fa-box-open"></i>
        </div>

        <h2 style="color: #134454; margin: 0; font-size: 22px;">تم يا شمس!</h2>
        <p style="color: #666; font-size: 14px; padding: 0 45px; margin-top: 10px; line-height: 1.6;">
           تم اختيار المندوب بنجاح
        </p>

        <div class="rating-section">
            <p style="margin: 0; font-size: 13px; color: #134454; font-weight: bold;">كيف كانت تجربة الاستلام؟</p>
            <div class="stars">
                <i class="far fa-star"></i>
                <i class="far fa-star"></i>
                <i class="far fa-star"></i>
                <i class="far fa-star"></i>
                <i class="far fa-star"></i>
            </div>
            <p style="font-size: 11px; color: #aaa; margin-top: 8px;">تقييمك يساعدنا نطور "بونص" لكِ</p>
        </div>

        <div style="flex: 1;"></div>

        <a href="customer_home.html" class="done-btn">
            العودة للرئيسية
        </a>

        <p style="font-size: 11px; color: #bbb; margin-bottom: 25px;">
            سعادتنا في خدمتكِ دائماً ✨
        </p>
    </div>

</body>
</html>
