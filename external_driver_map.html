<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - خريطة اللوكرات (خارجي)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .mobile-frame { 
            width: 100%; max-width: 400px; height: 800px; 
            background: white; position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            border-radius: 40px; border: 12px solid #333; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* ستايل شاشة السبلش - تم تعديل السنتر هنا */
        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #134454; z-index: 9999; 
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; /* يوسط كل شيء بالطول وبالعرض */
            color: white; transition: opacity 0.5s ease;
        }

        .loader {
            margin-top: 30px; border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top: 3px solid #86c2a4;
            width: 35px; height: 35px; animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* شريط علوي للمندوب الخارجي */
        .header-status {
            position: absolute; top: 20px; left: 20px; right: 20px; z-index: 10;
            background: #134454; padding: 15px; border-radius: 15px;
            color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: space-between;
        }

        .locker-alert {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            background: #2c8fac; color: white; padding: 10px 20px;
            border-radius: 20px; font-size: 12px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(44,143,172,0.3);
            z-index: 10; white-space: nowrap; display: flex; align-items: center; gap: 8px;
        }

        .map-marker { position: absolute; cursor: pointer; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .locker-label { background: white; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; color: #134454; margin-top: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .bottom-nav {
            background: white; border-top: 1px solid #eee; display: flex;
            justify-content: space-around; padding: 15px 0; position: absolute;
            bottom: 0; width: 100%; z-index: 100;
        }
        .nav-item { text-align: center; text-decoration: none; color: #bbb; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; }
        .nav-item.active { color: #134454; }
    </style>
</head>
<body>

    <div class="mobile-frame">
        
        <div id="splash-screen">
            <img src="images/logo.png" alt="Bounce Logo" style="width: 110px; margin-bottom: 20px;">
            <h1 style="margin: 0; font-size: 26px; letter-spacing: 2px; font-weight: bold;">BOUNCE</h1>
            <p style="font-size: 12px; opacity: 0.9; margin-top: 8px;">تطبيق توصيل خاص بجامعة الأميرة نورة</p>
            <div class="loader"></div>
        </div>

        <div class="main-app" style="height: 100%; position: relative; background: #e5e5e5; overflow: hidden;">
            
            <div class="header-status">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-truck" style="color: #86c2a4;"></i>
                    <span style="font-size: 13px;">كابتن: محمد أحمد</span>
                </div>
                <div style="font-size: 11px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px;">
                    إيداع خارجي
                </div>
            </div>

            <div class="locker-alert">
                <i class="fas fa-location-crosshairs"></i> لوكر محطة A4 هو الأقرب
            </div>

            <div style="height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1;">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14488.944203774614!2d46.723!3d24.814!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sar!2ssa!4v1712160000000!5m2!1sar!2ssa" width="100%" height="100%" style="border:0; filter: contrast(1.1) grayscale(0.1);" allowfullscreen="" loading="lazy"></iframe>
                
                <a href="external_locker_details.html" class="map-marker" style="top: 35%; left: 40%;">
                    <i class="fas fa-box" style="color: #134454; font-size: 20px; background: white; padding: 10px; border-radius: 50%; border: 2px solid #86c2a4;"></i>
                    <span class="locker-label">لوكر A4</span>
                </a>

                <a href="external_locker_details.html" class="map-marker" style="top: 55%; left: 20%;">
                    <i class="fas fa-box" style="color: #134454; font-size: 20px; background: white; padding: 10px; border-radius: 50%; border: 2px solid #86c2a4;"></i>
                    <span class="locker-label">المحطة الرياضية</span>
                </a>
                
                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
                    <div style="width: 15px; height: 15px; background: #2c8fac; border: 3px solid white; border-radius: 50%;"></div>
                </div>
            </div>

            <a href="external_driver_qr.html" style="text-decoration: none; position: absolute; bottom: 100px; left: 20px; right: 20px; z-index: 10;">
                <button style="width: 100%; padding: 18px; background: #134454; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <i class="fas fa-qrcode"></i> مسح QR للإيداع
                </button>
            </a>

            <nav class="bottom-nav">
                <a href="external_driver_map.html" class="nav-item active"><i class="fas fa-map-marked-alt"></i><span>الخريطة</span></a>
                <a href="external_driver_orders.html" class="nav-item"><i class="fas fa-history"></i><span>الإيداعات</span></a>
                <a href="external_driver.html" class="nav-item"><i class="fas fa-box"></i><span>الطلبات</span></a>
                <a href="driver_profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>الملف</span></a>
            </nav>

        </div>
    </div>

    <script>
        // إخفاء السبلش بعد ثانيتين ونصف بسلاسة
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 500);
        }, 2500);
    </script>
</body>
</html>
