<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - إيداع في اللوكر</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .mobile-frame { width: 100%; max-width: 400px; height: 800px; background: white; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); border-radius: 40px; border: 12px solid #333; overflow: hidden; display: flex; flex-direction: column; }
        header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; }
        .info-card { background: #f7faf9; border: 1px solid #86c2a4; border-radius: 20px; padding: 20px; margin: 15px; text-align: center; }
        .btn-confirm { background: #134454; color: white; border: none; padding: 18px; border-radius: 15px; margin: auto 20px 30px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; }
    </style>
</head>
<body>
    <div class="mobile-frame">
<header style="padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0;">
            <a href="customer_driver.html" style="color: #333;"><i class="fas fa-arrow-right"></i></a>
            <h3 style="margin: 0; font-size: 17px; color: #134454; display: flex; align-items: center; gap: 8px;">
                توصيل للّوكر <i class="fas fa-box" style="font-size: 16px;"></i>
            </h3>
            <div style="width: 20px;"></div>
        </header>
        <main style="padding: 10px;">
            <div class="info-card">
                <i class="fas fa-user-graduate" style="font-size: 40px; color: #134454; margin-bottom: 10px;"></i>
                <h4 style="margin: 0;">المندوبة حياة حمد</h4>
                <p style="font-size: 12px; color: #666;">ستقوم حياة باستلام طلبكِ وإيداعه في اللوكر</p>
            </div>
            <div style="padding: 20px;">
                <p style="font-size: 14px; color: #134454; font-weight: bold;"><i class="fas fa-map-marker-alt"></i> نقطة الاستلام:</p>
                <div style="background: #f9f9f9; padding: 15px; border-radius: 12px; font-size: 13px; color: #555;">كلية الحاسب والمعلومات - بوابة 4</div>
                
                <p style="font-size: 14px; color: #134454; font-weight: bold; margin-top: 20px;"><i class="fas fa-th"></i> رقم اللوكر المخصص:</p>
                <div style="background: #f9f9f9; padding: 15px; border-radius: 12px; font-size: 13px; color: #555;">Locker A4-15</div>
            </div>
        </main>
        <a href="customer_locker_success.html" class="btn-confirm">تأكيد وإرسال الطلب</a>
    </div>
</body>
</html>
