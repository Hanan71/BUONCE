<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - سجل الإيداعات</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; background: #f0f2f5; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .mobile-frame { 
            width: 100%; max-width: 400px; height: 800px; 
            background: white; position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            border-radius: 40px; border: 12px solid #333; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        header {
            padding: 25px 20px; background: #134454; color: white;
            text-align: center; border-radius: 0 0 25px 25px; flex-shrink: 0;
        }

        main { flex: 1; overflow-y: auto; padding: 15px; background: #fdfdfd; }

        /* ستايل كرت الطلب */
        .order-card {
            background: white; border-radius: 20px; padding: 15px;
            margin-bottom: 12px; border: 1px solid #f0f0f0; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex; align-items: center; gap: 15px;
        }

        .locker-icon-box {
            width: 50px; height: 50px; background: #f0f7f9; 
            border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; color: #2c8fac; font-size: 20px;
        }

        .order-info { flex: 1; }
        .order-info h4 { margin: 0; color: #134454; font-size: 14px; }
        .order-info p { margin: 3px 0 0; font-size: 11px; color: #888; }

        .order-status {
            text-align: left;
        }
        .status-tag {
            font-size: 10px; padding: 4px 10px; border-radius: 8px; font-weight: bold;
            background: #e8f5e9; color: #388e3c; /* لون النجاح */
        }

        .bottom-nav {
            background: white; border-top: 1px solid #eee; display: flex;
            justify-content: space-around; padding: 15px 0; flex-shrink: 0;
        }
        .nav-item {
            text-align: center; text-decoration: none; color: #bbb;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; }
        .nav-item.active { color: #134454; }
    </style>
</head>
<body>
    <div class="mobile-frame">
<header style="padding: 25px 20px; background: #134454; color: white; text-align: center; border-radius: 0 0 25px 25px; flex-shrink: 0;">
            <h3 style="margin: 0; font-size: 17px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                سجل الإيداعات <i class="fas fa-box" style="font-size: 16px;"></i>
            </h3>
        </header>

        <main>
            <p style="font-size: 12px; color: #134454; font-weight: bold; margin: 10px 5px;">اليوم</p>
            
            <div class="order-card">
                <div class="locker-icon-box"><i class="fas fa-box"></i></div>
                <div class="order-info">
                    <h4>لوكر محطة A4 - صندوق L-03</h4>
                    <p>رقم الطلب: #BNZ-9920</p>
                    <p><i class="far fa-clock"></i> 08:45 م</p>
                </div>
                <div class="order-status">
                    <span class="status-tag">تم الإيداع</span>
                </div>
            </div>

            <div class="order-card">
                <div class="locker-icon-box"><i class="fas fa-box"></i></div>
                <div class="order-info">
                    <h4>لوكر البوابة 2 - صندوق B-12</h4>
                    <p>رقم الطلب: #BNZ-9850</p>
                    <p><i class="far fa-clock"></i> 05:20 م</p>
                </div>
                <div class="order-status">
                    <span class="status-tag">تم الإيداع</span>
                </div>
            </div>

            <p style="font-size: 12px; color: #aaa; font-weight: bold; margin: 20px 5px 10px;">أمس</p>

            <div class="order-card" style="opacity: 0.8;">
                <div class="locker-icon-box" style="background: #f5f5f5; color: #aaa;"><i class="fas fa-box"></i></div>
                <div class="order-info">
                    <h4>لوكر المحطة الرياضية - S-05</h4>
                    <p>رقم الطلب: #BNZ-9710</p>
                    <p><i class="far fa-clock"></i> 02:15 م</p>
                </div>
                <div class="order-status">
                    <span class="status-tag" style="background: #eee; color: #888;">مكتمل</span>
                </div>
            </div>
        </main>
            <nav class="bottom-nav">
                <a href="external_driver_map.html" class="nav-item active"><i class="fas fa-map-marked-alt"></i><span>الخريطة</span></a>
                <a href="external_driver_orders.html" class="nav-item"><i class="fas fa-history"></i><span>الإيداعات</span></a>
                <a href="external_driver.html" class="nav-item"><i class="fas fa-box"></i><span>الطلبات</span></a>
                <a href="driver_profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>الملف</span></a>
            </nav>
    </div>
</body>
</html>
