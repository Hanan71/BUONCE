<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تفاصيل الطلب - كافيه بارن</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* التنسيق الموحد اللي يخلي الجوال في المنتصف والخلفية بترولية */
        body { 
            margin: 0; background: #134454; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .mobile-frame { 
            width: 100%; max-width: 400px; height: 800px; background: white; 
            position: relative; border-radius: 40px; border: 12px solid #333; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* رأس الصفحة */
        .header {
            background: #134454; color: white; padding: 40px 20px 20px;
            text-align: center; border-radius: 0 0 30px 30px;
        }
        .back-btn {
            position: absolute; top: 45px; right: 20px; color: white;
            text-decoration: none; font-size: 18px;
        }

        /* كرت تفاصيل الطلب */
        .order-card {
            margin: -25px 20px 20px; background: white; border-radius: 20px;
            padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }
        .status-badge {
            background: #e0f2f1; color: #134454; padding: 5px 12px;
            border-radius: 8px; font-size: 11px; font-weight: bold;
        }

        .info-row {
            display: flex; align-items: center; gap: 15px; margin-top: 20px;
            padding-bottom: 15px; border-bottom: 1px dashed #eee;
        }
        .info-row i { color: #2c8fac; font-size: 18px; width: 25px; text-align: center; }
        .info-label { font-size: 11px; color: #888; display: block; }
        .info-value { font-size: 13px; color: #333; font-weight: 500; }

        .price-container {
            background: #f9f9f9; padding: 15px; border-radius: 12px;
            margin-top: 20px; display: flex; justify-content: space-between; align-items: center;
        }

        /* زر الإجراء */
        .action-btn {
            background: #134454; color: white; border: none; padding: 16px;
            border-radius: 15px; width: 100%; font-size: 15px; font-weight: bold;
            cursor: pointer; margin-top: auto; margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(19,68,84,0.2);
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <a href="pnu_driver_tasks_list.html" class="back-btn"><i class="fas fa-chevron-right"></i></a>
        
        <div class="header">
            <h3 style="margin: 0; font-size: 18px;">تفاصيل المهمة ☕</h3>
            <p style="font-size: 12px; opacity: 0.8; margin-top: 5px;">رقم الطلب: #BK-992</p>
        </div>

        <main style="padding: 0 0 20px; flex: 1; display: flex; flex-direction: column;">
            <div class="order-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: bold; color: #134454;">كافيه بارن (محطة A4)</span>
                    <span class="status-badge">بانتظار القبول</span>
                </div>

                <div class="info-row">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <span class="info-label">نقطة الاستلام</span>
                        <span class="info-value">محطة A4 - الدور الأرضي</span>
                    </div>
                </div>

                <div class="info-row">
                    <i class="fas fa-flag-checkered"></i>
                    <div>
                        <span class="info-label">وجهة التوصيل</span>
                        <span class="info-value">كلية اللغات - مبنى 2.100</span>
                    </div>
                </div>

                <div class="info-row" style="border: none;">
                    <i class="fas fa-shopping-cart"></i>
                    <div>
                        <span class="info-label">محتوى الطلب</span>
                        <span class="info-value">1x كورتادو، 1x كيكة التمر</span>
                    </div>
                </div>

                <div class="price-container">
                    <span style="color: #666; font-size: 13px;">أجركِ من هذه المهمة:</span>
                    <span style="color: #134454; font-weight: bold; font-size: 18px;">15 ريال</span>
                </div>
            </div>

            <div style="padding: 0 20px; margin-top: auto;">
                <p style="font-size: 11px; color: #888; text-align: center; margin-bottom: 15px;">
                    <i class="fas fa-info-circle"></i> بقبولكِ المهمة، يرجى التوجه للمحل خلال 5 دقائق.
                </p>
                <button class="action-btn" onclick="window.location.href='pnu_driver_active_task.html'">
                    قبول المهمة والبدء
                </button>
            </div>
        </main>
    </div>
</body>
</html>
