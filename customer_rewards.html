<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - المكافآت</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bottom-nav {
            background: white; border-top: 1px solid #eee; display: flex;
            justify-content: space-around; padding: 12px 0; position: absolute;
            bottom: 0; width: 100%; z-index: 100;
        }
        .nav-item {
            text-align: center; text-decoration: none; color: #bbb;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; }
        .nav-item.active { color: #2c8fac; }

        /* ستايل بطاقات الجوائز المحسنة والاحترافية */
        .reward-card {
            background: white; border-radius: 20px; padding: 18px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 20px;
            border: 1px solid #f0f0f0; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            position: relative; overflow: hidden;
        }
        .reward-icon-container {
            width: 65px; height: 65px; background: #f0f4f8;
            border-radius: 15px; display: flex; align-items: center;
            justify-content: center; font-size: 28px; color: #134454; /* لون بترولي غامق */
        }
        .points-badge {
            background: #e4b33e; color: white; padding: 4px 12px;
            border-radius: 10px; font-size: 11px; font-weight: bold;
        }
        .redeem-btn {
            background: #134454; color: white; border: none;
            padding: 10px 18px; border-radius: 12px; font-size: 13px;
            cursor: pointer; font-weight: bold;
        }
        .redeem-btn.active-reward { background: #86c2a4; color: #134454; }
        
        /* حركة الأنيميشن للأيقونات الاحترافية */
        @keyframes float-icon {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .floating-icon { animation: float-icon 3s ease-in-out infinite; }

        /* بار التقدم المحسن */
        .progress-container {
            background: rgba(255,255,255,0.2); height: 8px;
            border-radius: 10px; margin-top: 15px; overflow: hidden;
        }
        .progress-bar { background: #86c2a4; height: 100%; width: 85%; }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="rewards-page" style="height: 100%; display: flex; flex-direction: column; background: #fff; position: relative; overflow: hidden;">
            
            <div style="background: #134454; padding: 30px 20px; border-radius: 0 0 35px 35px; color: white; position: relative;">
                <h3 style="margin: 0; font-size: 18px;">مكافآت بونس</h3>
                <div style="margin-top: 25px; text-align: center;">
                    <p style="font-size: 12px; opacity: 0.8; margin: 0;">نقاطك الحالية</p>
                    <h1 style="font-size: 45px; margin: 5px 0; color: #e4b33e; font-weight: bold;">
                        850 
                        <i class="fas fa-star floating-icon" style="font-size: 28px;"></i>
                    </h1>
                    <p style="font-size: 11px; margin: 0;">باقي لك 150 نقطة للوصول للمستوى الذهبي</p>
                    
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                </div>
            </div>

            <main style="flex: 1; padding: 25px 20px; overflow-y: auto; padding-bottom: 120px;">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h4 style="margin: 0; color: #134454; font-size: 16px;">استبدلي نقاطك</h4>
                    <span style="font-size: 12px; color: #2c8fac; font-weight: bold; text-decoration: underline;">سجل النقاط</span>
                </div>

                <div class="reward-card" style="background: #f1f8e9; border: 1px dashed #86c2a4;">
                    <div class="reward-icon-container" style="background: rgba(134,194,164,0.2); color: #86c2a4;">
                        <i class="fas fa-truck-loading floating-icon"></i>
                    </div>
                    <div style="flex: 1;">
                        <h5 style="margin: 0 0 5px; font-size: 15px; color: #134454; font-weight: bold;">توصيل مجاني</h5>
                        <p style="font-size: 11px; color: #134454; opacity: 0.8; margin: 0 0 5px;">صالحة لطلب واحد داخل الجامعة</p>
                        <span class="points-badge" style="background: #86c2a4; color: #134454;">200 نقطة</span>
                    </div>
                    <button class="redeem-btn active-reward">استبدال</button>
                </div>

                <div class="reward-card" style="opacity: 0.6;">
                    <div class="reward-icon-container">
                        <i class="fas fa-ticket-alt floating-icon"></i>
                    </div>
                    <div style="flex: 1;">
                        <h5 style="margin: 0 0 5px; font-size: 15px; color: #333; font-weight: bold;">قسيمة (50 ريال)</h5>
                        <p style="font-size: 11px; color: #888; margin: 0 0 5px;">قسيمة مشتريات للمتجر</p>
                        <span class="points-badge">1200 نقطة</span>
                    </div>
                    <i class="fas fa-lock" style="color: #ccc; font-size: 16px;"></i>
                </div>

                <div style="margin-top: 30px; text-align: center; color: #bbb;">
                    <p style="font-size: 11px; margin: 0;">يتم إضافة مكافآت جديدة أسبوعياً!</p>
                </div>

            </main>

            <nav class="bottom-nav">
                <a href="customer_home.html" class="nav-item active"><i class="fas fa-map"></i><span>خريطة</span></a>
                <a href="customer_order.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>طلبات</span></a>
                <a href="customer_rewards.html" class="nav-item"><i class="fas fa-gift"></i><span>مكافات</span></a>
                <a href="customer_profile.html" class="nav-item"><i class="fas fa-user"></i><span>الحساب</span></a>
            </nav>

        </div>
    </div>
</body>
</html>
