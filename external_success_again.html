<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - تم الفتح الطارئ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .mobile-frame { width: 100%; max-width: 400px; height: 800px; background: white; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); border-radius: 40px; border: 12px solid #333; overflow: hidden; display: flex; flex-direction: column; text-align: center; }
        
        .alert-icon {
            width: 90px; height: 90px; background: #fff3e0; color: #ff9800; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 60px auto 20px;
            border: 2px solid #ffe0b2;
        }

        .info-card { background: #f9f9f9; margin: 20px; padding: 20px; border-radius: 20px; border: 1px solid #eee; text-align: right; }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="alert-icon"><i class="fas fa-lock-open"></i></div>
        <h2 style="color: #134454; margin: 0;">تم الفتح الطارئ</h2>
        <p style="color: #666; font-size: 13px; padding: 0 40px; margin-top: 10px; line-height: 1.6;">
            تمت إعادة فتح الصندوق B-15 يرجى التأكد من إنهاء عملك وإغلاق الباب بإحكام مرة أخرى.
        </p>

        <div class="info-card">
            <p style="font-size: 12px; color: #e65100; font-weight: bold; margin-bottom: 5px;"><i class="fas fa-file-alt"></i> السبب المسجل:</p>
            <p style="font-size: 13px; color: #555; margin: 0;">تم إرسال بلاغ "فتح طارئ" للإدارة بالسبب الذي ذكرته.</p>
        </div>

        <div style="flex: 1;"></div>
        
        <a href="external_driver_profile.html" style="background: #134454; color: white; text-decoration: none; padding: 18px; border-radius: 15px; margin: 0 20px 40px; font-weight: bold; font-size: 16px;">العودة للرئيسية</a>
        
        <p style="font-size: 10px; color: #bbb; margin-bottom: 20px;">سيتم تسجيل هذه العملية في سجلات الأمان</p>
    </div>
</body>
</html>
