<!DOCTYPE html>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bottom-nav {
            background: white; border-top: 1px solid #eee; display: flex;
            justify-content: space-around; padding: 12px 0; position: absolute;
            bottom: 0; width: 100%; z-index: 100;
        }
        .nav-item {
            text-align: center; text-decoration: none; color: #bbb;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; font-weight: 500; }
        .nav-item.active { color: var(--pnu-teal); }

        .search-container { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 10; }
        .search-bar {
            background: white; padding: 12px 15px; border-radius: 15px;
            display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .search-bar input { border: none; outline: none; flex: 1; font-family: inherit; font-size: 14px; }
        
        /* إخفاء شريط التمرير للرموز */
        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-container { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
