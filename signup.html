<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - إنشاء حساب</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* إضافة ستايل بسيط للتحكم في حالة الكرت المختار */
        .type-card {
            transition: all 0.3s ease;
        }
        .type-card.selected {
            border: 2px solid var(--pnu-teal) !important;
            background: #f0f9fa !important;
        }
        .type-card.selected i {
            color: var(--pnu-teal) !important;
        }
        .type-card.selected p {
            color: var(--pnu-dark) !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="auth-page" style="padding: 30px 20px; height: 100%; display: flex; flex-direction: column; background: white;">
            
            <div style="text-align: center; margin-bottom: 30px; margin-top: 20px;">
                <img src="images/Logo.png" alt="Logo" style="width: 80px; height: 80px; border-radius: 50%;">
                <h2 style="color: var(--pnu-dark); margin-top: 15px; font-size: 22px;">إنشاء حساب جديد</h2>
                <p style="color: #888; font-size: 13px;">اختاري نوع الحساب للانضمام إلينا</p>
            </div>

            <div class="user-type-selection" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px;">
                
                <div class="type-card selected" onclick="selectCard(this)" style="border: 1px solid #eee; padding: 15px 5px; border-radius: 15px; text-align: center; cursor: pointer;">
                    <i class="fas fa-user" style="color: #aaa; font-size: 22px;"></i>
                    <p style="font-size: 11px; margin-top: 8px; color: #666;">طلب جديد</p>
                </div>

                <div class="type-card" onclick="selectCard(this)" style="border: 1px solid #eee; padding: 15px 5px; border-radius: 15px; text-align: center; cursor: pointer;">
                    <i class="fas fa-biking" style="color: #aaa; font-size: 22px;"></i>
                    <p style="font-size: 11px; margin-top: 8px; color: #666;">مندوبة</p>
                </div>

                <div class="type-card" onclick="selectCard(this)" style="border: 1px solid #eee; padding: 15px 5px; border-radius: 15px; text-align: center; cursor: pointer;">
                    <i class="fas fa-box-open" style="color: #aaa; font-size: 22px;"></i>
                    <p style="font-size: 11px; margin-top: 8px; color: #666;">مندوب خارجي</p>
                </div>
            </div>

            <div class="auth-form" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="input-group">
                    <input type="text" placeholder="الاسم الكامل" style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #efefef; background: #fdfdfd; outline: none; font-family: inherit;">
                </div>
                <div class="input-group">
                    <input type="email" placeholder="البريد الإلكتروني / الجامعي" style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #efefef; background: #fdfdfd; outline: none; font-family: inherit;">
                </div>
                <div class="input-group">
                    <input type="password" placeholder="كلمة المرور" style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #efefef; background: #fdfdfd; outline: none; font-family: inherit;">
                </div>
            </div>

<a href="login.html" style="text-decoration: none; width: 100%;">
    <button class="new-order-btn" style="margin-top: 30px; width: 100%; border: none; font-family: inherit; cursor: pointer;">
        إنشاء الحساب
    </button>
</a>

<p style="text-align: center; margin-top: auto; font-size: 13px; color: #666; padding-bottom: 20px;">
    لديكِ حساب بالفعل؟ <a href="login.html" style="color: var(--pnu-teal); font-weight: bold; text-decoration: none;">تسجيل دخول</a>
</p>

    <script>
        function selectCard(element) {
            // إزالة التحديد من جميع الكروت
            document.querySelectorAll('.type-card').forEach(card => {
                card.classList.remove('selected');
            });
            // إضافة التحديد للكرت المختار
            element.classList.add('selected');
        }
    </script>
</body>
</html>
