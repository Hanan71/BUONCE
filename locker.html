<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - لوحة المندوبة</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; background: #f0f2f5; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .mobile-frame { 
            width: 100%; max-width: 400px; height: 800px; 
            background: white; position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            border-radius: 40px; border: 12px solid #333; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* ستايل التوثيق للمندوبة */
        .verified-badge {
            background: rgba(44,143,172,0.1); color: #2c8fac;
            padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: bold;
            display: flex; align-items: center; gap: 5px;
        }

        /* ستايل الصناديق */
        .locker-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 20px 0;
        }
        .locker-box {
            background: white; border: 2px solid #eee; border-radius: 18px;
            padding: 15px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        /* صندوق ممتلئ (غير متاح للمندوبة) */
        .locker-box.occupied { background: #f5f5f5; border-color: #eee; cursor: not-allowed; }
        .locker-box.occupied i { color: #ccc; }
        
        /* صندوق فارغ (متاح للإيداع) */
        .locker-box.available { border-color: #86c2a4; background: #f7faf9; }
        .locker-box.available i { color: #86c2a4; }
        
        /* الصندوق اللي اختارته المندوبة */
        .locker-box.selected { 
            border-color: #134454; background: #e0f2f1; 
            box-shadow: 0 0 10px rgba(19, 68, 84, 0.2);
            transform: scale(1.05);
        }

        .action-card {
            background: #fff; border-radius: 25px; padding: 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            border-top: 1px solid #f0f0f0; margin-top: auto;
        }

        .main-btn {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            font-weight: bold; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
<header style="padding: 20px; display: flex; align-items: center; justify-content: space-between; background: #134454; color: white; border-radius: 0 0 25px 25px;">
            <a href="index.html" style="color: white; text-decoration: none;">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h3 style="font-size: 17px; margin: 0; display: flex; align-items: center; gap: 8px;">
                توصيل للّوكر <i class="fas fa-box" style="font-size: 16px;"></i>
            </h3>
            <div style="width: 20px;"></div>
        </header>

        <main style="padding: 20px; flex: 1; display: flex; flex-direction: column;">
            
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h4 style="margin: 0; color: #134454;">لوكر محطة A4</h4>
                    <p style="margin: 5px 0 0; font-size: 12px; color: #888;"><i class="fas fa-map-marker-alt"></i> كلية الحاسب والمعلومات</p>
                </div>
                <div class="verified-badge">
                    <i class="fas fa-user-shield"></i> موثقة رقمياً
                </div>
            </div>

            <p style="margin: 25px 0 10px; color: #134454; font-size: 14px; font-weight: bold;">اختاري صندوقاً فارغاً (باللون الأخضر):</p>
            
            <div class="locker-grid">
                <div class="locker-box occupied"><i class="fas fa-lock"></i><div style="font-size: 10px; margin-top: 5px;">L-01</div></div>
                <div class="locker-box available selected" onclick="selectLocker(this)"><i class="fas fa-unlock"></i><div style="font-size: 10px; margin-top: 5px;">L-02</div></div>
                <div class="locker-box occupied"><i class="fas fa-lock"></i><div style="font-size: 10px; margin-top: 5px;">L-03</div></div>
                <div class="locker-box available" onclick="selectLocker(this)"><i class="fas fa-unlock"></i><div style="font-size: 10px; margin-top: 5px;">L-04</div></div>
                <div class="locker-box available" onclick="selectLocker(this)"><i class="fas fa-unlock"></i><div style="font-size: 10px; margin-top: 5px;">L-05</div></div>
                <div class="locker-box occupied"><i class="fas fa-lock"></i><div style="font-size: 10px; margin-top: 5px;">L-06</div></div>
            </div>

            <div class="action-card">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                    <div style="width: 40px; height: 40px; background: #f0f7f9; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #2c8fac;">
                        <i class="fas fa-info-circle"></i>
                    </div>
                    <p style="font-size: 12px; color: #666; margin: 0;">الصندوق المختار: <strong style="color: #134454;" id="selectedID">L-02</strong></p>
                </div>
                
                <button class="main-btn" style="background: #134454; color: white; margin-bottom: 12px;" onclick="location.href='external_driver_qr.html'">
                    <i class="fas fa-qrcode"></i> مسح QR الصندوق للفتح
                </button>
                
                <button class="main-btn" style="background: #86c2a4; color: #134454;" onclick="location.href='external_driver_qr.html'">
                    إيداع يدوي بالرمز
                </button>
            </div>

        </main>
    </div>

    <script>
        function selectLocker(element) {
            // إزالة التحديد من الصناديق الأخرى
            document.querySelectorAll('.locker-box').forEach(box => {
                box.classList.remove('selected');
            });
            // إضافة التحديد للصندوق المختار
            element.classList.add('selected');
            // تحديث رقم الصندوق في الأسفل
            document.getElementById('selectedID').innerText = element.innerText.trim();
        }
    </script>
</body>
</html>
