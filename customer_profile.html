<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUNCE - الملف الشخصي</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bottom-nav {
            background: white; border-top: 1px solid #eee; display: flex;
            justify-content: space-around; padding: 12px 0; position: absolute;
            bottom: 0; width: 100%; z-index: 100;
        }
        .nav-item {
            text-align: center; text-decoration: none; color: #bbb;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; font-weight: 500; }
        .nav-item.active { color: #2c8fac; }

        .menu-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 18px; background: white; border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
        }
        .menu-item:active { background: #f9f9f9; }
        .menu-item i.icon-lead {
            width: 32px; height: 32px; background: #f0f4f8;
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; color: #134454; margin-left: 12px;
        }

        @keyframes pulse-help {
            0% { transform: scale(1); box-shadow: 0 4px 10px rgba(44,143,172,0.3); }
            50% { transform: scale(1.1); box-shadow: 0 6px 15px rgba(44,143,172,0.5); }
            100% { transform: scale(1); box-shadow: 0 4px 10px rgba(44,143,172,0.3); }
        }
        .help-fab {
            position: absolute; bottom: 80px; left: 20px;
            width: 45px; height: 45px; background: #2c8fac;
            color: white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 18px; z-index: 90; animation: pulse-help 2s infinite;
            cursor: pointer; text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="profile-page" style="height: 100%; display: flex; flex-direction: column; background: #fff; position: relative; overflow: hidden;">
            
            <div style="background: #134454; padding: 20px 20px 40px; text-align: center; border-radius: 0 0 30px 30px; position: relative; z-index: 1;">
                <a href="customer_home.html" style="position: absolute; top: 15px; right: 15px; color: white;">
                    <i class="fas fa-arrow-right"></i>
                </a>
                
                <div style="width: 70px; height: 70px; background: white; border-radius: 50%; margin: 0 auto 8px; border: 3px solid #b0bec5; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                    <i class="fas fa-user-graduate" style="font-size: 35px; color: #134454;"></i>
                </div>
                
                <h2 style="color: white; font-size: 18px; margin: 0;">شمس شريف</h2>
                <p style="color: #86c2a4; font-size: 11px; margin-top: 2px;">طالبة - جامعة الأميرة نورة</p>
            </div>

            <div style="flex: 1; overflow-y: auto; padding-bottom: 140px; margin-top: 20px; position: relative; z-index: 2;">
                
                <div style="padding: 0 20px;">
                    <div style="background: linear-gradient(135deg, #2c8fac 0%, #134454 100%); padding: 20px; border-radius: 18px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: flex-start; color: white;">
                        <div style="text-align: right;">
                            <p style="font-size: 10px; opacity: 0.8; margin: 0;">رصيد نقاط بونس</p>
                            <h3 style="font-size: 22px; margin: 2px 0 10px;">850 <span style="font-size: 12px;">نقطة</span></h3>
                            
                            <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; display: flex; flex-direction: column; gap: 4px;">
                                <div style="display: flex; align-items: center; gap: 6px; font-size: 11px; opacity: 0.9;">
                                    <i class="fas fa-envelope" style="font-size: 10px; width: 12px;"></i>
                                    <span>shams@pnu.edu.sa</span>
                                </div>
                                <div style="display: flex; align-items: center; gap: 6px; font-size: 11px; opacity: 0.9;">
                                    <i class="fas fa-id-card" style="font-size: 10px; width: 12px;"></i>
                                    <span>44100XXXX</span>
                                </div>
                            </div>
                        </div>

                        <div style="text-align: center; background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); min-width: 70px;">
                            <i class="fas fa-medal" style="color: #b0bec5; font-size: 18px;"></i>
                            <p style="font-size: 9px; margin-top: 4px; color: #b0bec5; font-weight: bold;">المستوى الفضي</p>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <a href="customer_edit_profile.html" style="text-decoration: none; color: inherit;">
                        <div class="menu-item">
                            <div style="display: flex; align-items: center;">
                                <i class="fas fa-user-edit icon-lead"></i>
                                <span style="font-size: 14px; color: #333;">تعديل الملف الشخصي</span>
                            </div>
                            <i class="fas fa-chevron-left" style="font-size: 11px; color: #ccc;"></i>
                        </div>
                    </a>

                    <a href="customer_addresses.html" style="text-decoration: none; color: inherit;">
                        <div class="menu-item">
                            <div style="display: flex; align-items: center;">
                                <i class="fas fa-map-marked-alt icon-lead"></i>
                                <span style="font-size: 14px; color: #333;">عناويني المحفوظة</span>
                            </div>
                            <i class="fas fa-chevron-left" style="font-size: 11px; color: #ccc;"></i>
                        </div>
                    </a>

                    <a href="customer_wallet.html" style="text-decoration: none; color: inherit;">
                        <div class="menu-item">
                            <div style="display: flex; align-items: center;">
                                <i class="fas fa-wallet icon-lead"></i>
                                <span style="font-size: 14px; color: #333;">المحفظة وطرق الدفع</span>
                            </div>
                            <i class="fas fa-chevron-left" style="font-size: 11px; color: #ccc;"></i>
                        </div>
                    </a>

                    <div class="menu-item" style="border: none; margin-top: 10px;">
                        <a href="login.html" style="text-decoration: none; display: flex; align-items: center; color: #e74c3c;">
                            <i class="fas fa-sign-out-alt icon-lead" style="background: #fff5f5; color: #e74c3c;"></i>
                            <span style="font-size: 14px; font-weight: bold;">تسجيل الخروج</span>
                        </a>
                    </div>
                </div>
            </div> <a href="customer_help_center.html" class="help-fab">
                <i class="fas fa-headset"></i>
            </a>
            <nav class="bottom-nav">
                <a href="customer_home.html" class="nav-item active"><i class="fas fa-map"></i><span>خريطة</span></a>
                <a href="customer_order.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>طلبات</span></a>
                <a href="customer_rewards.html" class="nav-item"><i class="fas fa-gift"></i><span>مكافات</span></a>
                <a href="customer_profile.html" class="nav-item"><i class="fas fa-user"></i><span>الحساب</span></a>
            </nav>

        </div>
    </div>
</body>
</html>
